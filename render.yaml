services:
  # ── Backend API (Node.js / Express) ───────────────────────────────────────────
  - type: web
    name: milsys-rdc-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: /api/v1
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 8h
      - key: JWT_REFRESH_EXPIRE
        value: 7d
      - key: ALLOWED_ORIGINS
        value: https://defensedrc.onrender.com
      - key: RATE_LIMIT_WINDOW
        value: 15
      - key: RATE_LIMIT_MAX
        value: 1000
      - key: AUTH_RATE_LIMIT_MAX
        value: 50
      - key: OTP_ISSUER
        value: MILSYS-RDC
      - key: OTP_WINDOW
        value: 1
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: UPLOAD_PATH
        value: ./uploads
      - key: LOG_LEVEL
        value: warn

  # ── Frontend (Next.js — Web Service, pas Static Site) ─────────────────────────
  - type: web
    name: milsys-rdc-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://defensedrcbackend.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://defensedrcbackend.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: MILSYS RDC
      - key: NEXT_PUBLIC_APP_VERSION
        value: 1.0.0
